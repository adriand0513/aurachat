<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aurachat - Chat with Personalities</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        :root {
            --bg: #0d0015;
            --card: rgba(30, 10, 50, 0.88);
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --sidebar-bg: rgba(20, 5, 40, 0.95);
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            margin: 0;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(195,0,255,0.12);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(90deg, #ff0099, #c300ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(195,0,255,0.15);
            transform: translateX(4px);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-size: cover;
            margin-right: 16px;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .chat-info h3 {
            margin: 0;
            font-size: 17px;
        }

        .chat-info p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff3366, #d50000);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" style="width: 40px; height: 40px; background-image: url('/static/images/isabella.png');"></div>
                <h1>Aurachat</h1>
            </div>
            <div class="user-info">
                <span id="username-display">Guest</span>
                <button class="logout-btn" onclick="logout()" style="display: none;" id="logout-btn">Logout</button>
            </div>
        </div>

        <div class="chat-list">
            <div class="chat-item active" onclick="openChat('/chat')">
                <div class="chat-avatar" style="background-image: url('/static/images/isabella.png');"></div>
                <div class="chat-info">
                    <h3>Isabella</h3>
                    <p>Online • Your favorite personality</p>
                </div>
            </div>

            <!-- Future personalities -->
            <div class="chat-item" style="opacity: 0.6; cursor: not-allowed;">
                <div class="chat-avatar" style="background: #444;"></div>
                <div class="chat-info">
                    <h3>Coming Soon</h3>
                    <p>More personalities on the way...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <p>Select a chat to begin</p>
    </div>

    <script>
        const API_BASE = '/';
        let token = localStorage.getItem('auth_token');

        async function checkLogin() {
            if (!token) {
                window.location.href = '/chat';  // Redirect to login modal
                return;
            }

            try {
                const res = await fetch('/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('username-display').textContent = user.email || 'User';
                    document.getElementById('logout-btn').style.display = 'block';
                } else {
                    localStorage.removeItem('auth_token');
                    window.location.href = '/chat';
                }
            } catch (err) {
                localStorage.removeItem('auth_token');
                window.location.href = '/chat';
            }
        }

        function openChat(url) {
            if (!token) {
                window.location.href = '/chat';
                return;
            }
            window.location.href = url;
        }

        function logout() {
            localStorage.removeItem('auth_token');
            window.location.href = '/';
        }

        // Check login on page load
        window.addEventListener('load', checkLogin);
    </script>
</body>
</html>
