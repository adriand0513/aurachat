<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AuraChat Dashboard</title>
    <style>
        body {
            background: #0d0015;
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            padding: 40px;
            line-height: 1.6;
        }
        h1 {
            color: #ff0099;
            text-align: center;
        }
        pre {
            background: rgba(35,25,60,0.9);
            padding: 30px;
            border-radius: 16px;
            overflow: auto;
            max-width: 900px;
            margin: 30px auto;
            white-space: pre-wrap;
        }
        .error {
            color: #ff3366;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>AuraChat Dashboard</h1>
    <p style="text-align:center; color:#bb99cc;">Isabella • Live Insights</p>
    
    <div id="content">
        <p style="text-align:center;">Loading data...</p>
    </div>

    <script>
        const pw = new URLSearchParams(window.location.search).get('pw') || '';

        async function loadData() {
            try {
                const res = await fetch(`/analytics?pw=${pw}`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                const data = await res.json();
                document.getElementById('content').innerHTML = `
                    <pre style="background:#1f1b2e; padding:20px; border-radius:12px; text-align:left; overflow:auto;">
    ${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <p style="color:#ff3366; text-align:center;">
                        Failed to load data.<br>
                        ${err.message}<br>
                        Please check server logs.
                    </p>
                `;
            }
        }

        loadData();
        setInterval(loadData, 15000); // refresh every 15 seconds
    </script>
</body>
</html>
