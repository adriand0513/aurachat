<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AuraChat Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0015; color: #f8f0ff; font-family: system-ui; padding: 30px; text-align: center; }
        h1 { color: #ff0099; font-size: 2.8rem; }
        .card { background: rgba(35,25,60,0.9); padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 800px; }
        .error { color: #ff3366; }
    </style>
</head>
<body>
    <h1>AuraChat Dashboard</h1>
    <p>Isabella • Live Insights</p>
    
    <div class="card" id="content">
        <p>Loading data...</p>
    </div>

    <script>
        const pw = new URLSearchParams(window.location.search).get('pw');

        async function loadData() {
            try {
                const res = await fetch(`/analytics/data?pw=${pw}`);
                const data = await res.json();
                document.getElementById('content').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (e) {
                document.getElementById('content').innerHTML = `<p class="error">Failed to load data. Please check logs.</p>`;
            }
        }

        loadData();
    </script>
</body>
</html>
