<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AuraChat Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --card: rgba(30, 20, 50, 0.95);
            --glow: rgba(195, 0, 255, 0.2);
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: var(--accent-pink);
            font-size: 2.8rem;
            margin: 0 0 8px 0;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: var(--card);
            padding: 28px 24px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 20px var(--glow);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
        .stat-card h3 {
            margin: 0 0 12px 0;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }
        .stat-value {
            font-size: 42px;
            font-weight: 700;
            color: var(--accent-purple);
            margin: 0;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }
        .chart-container {
            background: var(--card);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--glow);
        }
        .chart-title {
            margin-bottom: 20px;
            color: var(--accent-pink);
            font-size: 1.4rem;
        }
        canvas {
            max-height: 380px;
        }
        .emotions-section {
            background: var(--card);
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--glow);
        }
        .emotion-bar {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }
        .emotion-name {
            width: 160px;
            font-weight: 600;
            color: var(--accent-pink);
        }
        .emotion-progress {
            flex: 1;
            height: 14px;
            background: #222;
            border-radius: 999px;
            overflow: hidden;
            margin: 0 20px;
        }
        .emotion-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent-purple), var(--accent-pink));
            transition: width 0.6s ease;
        }
        .last-updated {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AuraChat Dashboard</h1>
            <p class="subtitle">Isabella • Real-time Conversation Insights</p>
        </header>

        <!-- Summary Stats -->
        <div class="stats-grid" id="summary-stats"></div>

        <!-- Charts Row -->
        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-title">Hourly Activity (Time of Day)</div>
                <canvas id="hourlyChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Daily Activity (Last 14 Days)</div>
                <canvas id="dailyChart"></canvas>
            </div>
        </div>

        <!-- Top Emotions -->
        <div class="emotions-section">
            <div class="chart-title">Top Emotions Isabella Sends</div>
            <div id="top-emotions"></div>
        </div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <script>
        const pw = new URLSearchParams(window.location.search).get('pw');

        async function loadDashboard() {
            try {
                const res = await fetch(`/analytics?pw=${pw}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                console.log("Dashboard data received:", data);

                const s = data.summary || {};

                // Summary Cards
                document.getElementById('summary-stats').innerHTML = `
                    <div class="stat-card">
                        <h3>Total Conversations</h3>
                        <p class="stat-value">${s.total_conversations || 0}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Messages</h3>
                        <p class="stat-value">${s.total_messages || 0}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Active Today</h3>
                        <p class="stat-value">${s.active_today || 0}</p>
                    </div>
                `;

                // Last Updated
                document.getElementById('last-updated').textContent = 
                    `Last updated: ${new Date().toLocaleTimeString()}`;

                // Hourly Chart
                const hourlyLabels = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
                const hourlyValues = hourlyLabels.map(h => (data.hourly_activity || {})[h.slice(0,2)] || 0);

                new Chart(document.getElementById('hourlyChart'), {
                    type: 'bar',
                    data: {
                        labels: hourlyLabels,
                        datasets: [{
                            label: 'Messages Sent',
                            data: hourlyValues,
                            backgroundColor: '#c300ff',
                            borderColor: '#ff0099',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: '#333' } } }
                    }
                });

                // Daily Chart
                const dailyLabels = Object.keys(data.daily_activity || {});
                const dailyValues = Object.values(data.daily_activity || {});

                new Chart(document.getElementById('dailyChart'), {
                    type: 'line',
                    data: {
                        labels: dailyLabels,
                        datasets: [{
                            label: 'Messages per Day',
                            data: dailyValues,
                            borderColor: '#ff0099',
                            backgroundColor: 'rgba(255, 0, 153, 0.1)',
                            tension: 0.4,
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });

                // Top Emotions
                const emotionsDiv = document.getElementById('top-emotions');
                const topEmotions = data.top_emotions || {};
                let html = '';
                Object.entries(topEmotions).forEach(([emotion, count]) => {
                    const percentage = s.total_messages ? Math.round((count / s.total_messages) * 100) : 0;
                    html += `
                        <div class="emotion-bar">
                            <div class="emotion-name">${emotion}</div>
                            <div class="emotion-progress">
                                <div class="emotion-fill" style="width: ${percentage}%"></div>
                            </div>
                            <div style="width: 70px; text-align: right; font-weight: 600;">${count}</div>
                        </div>
                    `;
                });
                emotionsDiv.innerHTML = html || '<p style="color:#bb99cc; text-align:center;">No emotion data yet. Start chatting with Isabella!</p>';

            } catch (err) {
                console.error("Dashboard load error:", err);
                document.getElementById('top-emotions').innerHTML = 
                    `<p style="color:red; text-align:center;">Failed to load dashboard data.<br>Check server logs.</p>`;
            }
        }

        // Load immediately
        loadDashboard();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
