<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Aurachat</title>
    <link rel="stylesheet" href="/static/style.css?v=0432" />
    
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        .chat-header {
            padding: 14px 20px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            flex-shrink: 0;
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-container {
            position: relative;
            width: 48px;
            height: 48px;
            cursor: pointer;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 120px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(to bottom, rgba(13,0,21,0.6), transparent);
            min-height: 0;
        }
        .message {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }
        .received {
            background: rgba(30,20,50,0.9);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }
        .input-area {
            padding: 12px 16px env(safe-area-inset-bottom, 12px);
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 1000;
        }
        #user-input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 32px;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
        }
        #user-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(195,0,255,0.3);
        }
        #send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 82%;
            font-size: 14px;
            color: var(--text-muted);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .typing-indicator.visible {
            visibility: visible;
            opacity: 1;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        #clear-chat-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--danger), #d50000);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .avatar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .avatar-modal.show {
            display: flex;
        }
        .avatar-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(195,0,255,0.7);
            object-fit: contain;
        }
        .avatar-modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 60px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .voice-note {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(45, 30, 75, 0.95);
            border-radius: 9999px;
            max-width: 78%;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .voice-play-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-purple);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="avatar-container" onclick="openFullAvatar()">
                <div class="avatar" style="background-image: url('/static/images/isabella.png?v=0432');"></div>
            </div>
            <div class="contact-info">
                <h2>Isabella</h2>
            </div>
        </div>
        <button id="clear-chat-btn" onclick="clearConversation()">Clear Chat</button>
    </div>

    <div id="avatar-modal" class="avatar-modal">
        <span class="avatar-modal-close" onclick="closeFullAvatar()">×</span>
        <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png?v=0432" alt="Isabella">
    </div>

    <div id="messages-container"></div>

    <div id="typing-indicator" class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span>Isabella is typing...</span>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" autofocus />
        <button id="send-btn">➤</button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let convoId = localStorage.getItem('convo_id') || 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('convo_id', convoId);
        let messagesHistory = [];

        function loadHistory() {
            try {
                const saved = localStorage.getItem('messages_history');
                messagesHistory = saved ? JSON.parse(saved) : [];
            } catch (e) { messagesHistory = []; }
        }

        function saveHistory() {
            localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
        }

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addVoiceNote(audioUrl) {
            if (!audioUrl) return;
            // Voice note UI (placeholder for now)
            const voiceDiv = document.createElement('div');
            voiceDiv.className = 'voice-note message received';
            voiceDiv.innerHTML = `<button class="voice-play-btn">▶</button> Voice Note`;
            messagesContainer.appendChild(voiceDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            saveHistory();
            input.value = '';

            typingIndicator.classList.add('visible');

            try {
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, convo_id: convoId })
                });
            } catch (err) {
                console.error(err);
            }

            input.focus();
        }

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        sendBtn.addEventListener('touchend', e => {
            e.preventDefault();
            sendMessage();
        });

        function openFullAvatar() {
            document.getElementById('avatar-modal').classList.add('show');
        }

        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.addEventListener('load', () => {
            loadHistory();
            messagesContainer.innerHTML = '';
            messagesHistory.forEach(msg => {
                addMessage(msg.content, msg.role === 'user' ? 'sent' : 'received');
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.focus();
        });
    </script>
</body>
</html>
