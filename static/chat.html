<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Isabella</title>
  <style>
    :root {
      --bg: #0f031a;
      --bubble-user: linear-gradient(135deg, #6b48ff, #a032f5);
      --bubble-bot: #2a1b3d;
      --text: #f5f0ff;
      --text-muted: #c9b8e6;
      --accent-soft: #d19cff;
      --input-bg: rgba(40, 25, 60, 0.7);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 14px 16px;
      background: rgba(20,10,40,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200,140,255,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .avatar-container {
      position: relative;
      cursor: pointer;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: url('/static/images/isabella.png') center/cover;
      border: 2px solid var(--accent-soft);
      transition: all 0.2s ease;
    }
    .avatar-container:hover .avatar {
      transform: scale(1.08);
      box-shadow: 0 0 16px rgba(209,156,255,0.5);
    }
    header .info h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .status {
      font-size: 13px;
      color: #c9b8e6;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 15.5px;
      line-height: 1.42;
      position: relative;
    }
    .sent {
      background: var(--bubble-user);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }
    .received {
      background: var(--bubble-bot);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }
    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
      opacity: 0.7;
    }
    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .input-area {
      padding: 12px 16px;
      background: rgba(20,10,40,0.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(200,140,255,0.12);
      display: flex;
      gap: 10px;
    }
    #input {
      flex: 1;
      padding: 13px 18px;
      border: none;
      border-radius: 26px;
      background: var(--input-bg);
      color: white;
      font-size: 16px;
    }
    #input:focus { outline: none; box-shadow: 0 0 0 2px rgba(209,156,255,0.4); }
    #send {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
    /* ── Avatar Modal ──────────────────────────────────────── */
    #avatar-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #avatar-modal.show { display: flex; }
    .avatar-modal-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }
    .avatar-modal-content {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(209,156,255,0.6);
      object-fit: contain;
    }
    .avatar-modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 48px;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      transition: all 0.2s;
    }
    .avatar-modal-close:hover {
      color: var(--accent-soft);
      transform: scale(1.15);
    }
    /* ── Custom Audio Player ───────────────────────────────── */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(50,35,70,0.7);
      border-radius: 16px;
      margin-top: 6px;
      width: 240px;
    }
    .audio-play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: white;
      border: none;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .audio-progress {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      cursor: pointer;
      overflow: hidden;
    }
    .audio-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-soft);
      transition: width 0.1s linear;
    }
    .audio-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    /* ── Age Modal ─────────────────────────────────────────── */
    #age-modal {
      position: fixed;
      inset: 0;
      background: rgba(10,5,25,0.96);
      backdrop-filter: blur(12px);
      display: none;
      place-items: center;
      z-index: 1000;
    }
    #age-modal.show { display: grid; }
    .age-box {
      background: rgba(30,20,50,0.95);
      padding: 40px 28px;
      border-radius: 24px;
      text-align: center;
      max-width: 90%;
      border: 1px solid rgba(200,140,255,0.2);
    }
    .age-box h2 { font-size: 26px; margin-bottom: 16px; }
    .age-box p { margin-bottom: 28px; color: #d0c0ff; }
    .age-btn {
      padding: 14px 40px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      font-size: 17px;
      cursor: pointer;
    }
    #yes { background: #9b6dff; color: white; }
    #no  { background: #ff4d88; color: white; }
  </style>
</head>
<body>

<header>
  <div class="avatar-container" onclick="openAvatarModal()">
    <div class="avatar"></div>
  </div>
  <div class="info">
    <h2>Isabella</h2>
    <div class="status">online</div>
  </div>
</header>

<div id="messages">
  <div id="history-loading">Loading messages…</div>
</div>

<div id="typing" class="typing hidden">
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
</div>

<div class="input-area">
  <input id="input" type="text" placeholder="Message Isabella…" autocomplete="off" autofocus disabled />
  <button id="send" disabled>➤</button>
</div>

<!-- Avatar Full View Modal -->
<div id="avatar-modal">
  <span class="avatar-modal-close" onclick="closeAvatarModal()">×</span>
  <div class="avatar-modal-inner">
    <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png" alt="Isabella">
  </div>
</div>

<!-- Age Confirmation -->
<div id="age-modal">
  <div class="age-box">
    <h2>One moment</h2>
    <p>This experience is 18+ only.<br>Are you 18 or older?</p>
    <button id="yes" class="age-btn">Yes, I'm 18+</button>
    <button id="no"  class="age-btn">No</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const typing = document.getElementById('typing');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const ageModal = document.getElementById('age-modal');

  let history = JSON.parse(localStorage.getItem('chatHistory') || '[]');

  // ── Avatar Modal ────────────────────────────────────────
  function openAvatarModal() {
    document.getElementById('avatar-modal').classList.add('show');
  }
  function closeAvatarModal() {
    const modal = document.getElementById('avatar-modal');
    modal.classList.remove('show');
  }
  document.getElementById('avatar-modal').onclick = (e) => {
    if (e.target === document.getElementById('avatar-modal')) closeAvatarModal();
  };

  // ── Custom Audio Player ─────────────────────────────────
  function createAudioPlayer(src) {
    const container = document.createElement('div');
    container.className = 'audio-player';

    const playBtn = document.createElement('button');
    playBtn.className = 'audio-play-btn';
    playBtn.textContent = '▶';

    const progress = document.createElement('div');
    progress.className = 'audio-progress';
    const fill = document.createElement('div');
    fill.className = 'audio-progress-fill';
    progress.appendChild(fill);

    const timeDisplay = document.createElement('span');
    timeDisplay.className = 'audio-time';
    timeDisplay.textContent = '0:00 / 0:00';

    container.appendChild(playBtn);
    container.appendChild(progress);
    container.appendChild(timeDisplay);

    const audio = new Audio(src);

    audio.addEventListener('timeupdate', () => {
      const percent = (audio.currentTime / audio.duration) * 100;
      fill.style.width = `${percent}%`;
      const current = formatTime(audio.currentTime);
      const duration = formatTime(audio.duration || 0);
      timeDisplay.textContent = `${current} / ${duration}`;
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
    });

    playBtn.onclick = () => {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = '❚❚';
      } else {
        audio.pause();
        playBtn.textContent = '▶';
      }
    };

    progress.onclick = (e) => {
      const rect = progress.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pos * audio.duration;
    };

    return container;
  }

  function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  // ── Message Helper ──────────────────────────────────────
  function addMessage(text, type = 'received', voiceUrl = null) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;

    const time = document.createElement('div');
    time.className = 'message-time';
    time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    div.appendChild(time);

    if (voiceUrl) {
      const player = createAudioPlayer(voiceUrl);
      div.appendChild(player);
    }

    messagesDiv.appendChild(div);
    messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
  }

  // ── Load History ────────────────────────────────────────
  window.addEventListener('load', () => {
    if (history.length > 0) {
      history.forEach(m => addMessage(m.content, m.role === 'user' ? 'sent' : 'received'));
      document.getElementById('history-loading')?.remove();
    }
    ageModal.classList.add('show');
  });

  // ── Age Gate ────────────────────────────────────────────
  document.getElementById('yes').onclick = () => {
    ageModal.classList.remove('show');
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  };
  document.getElementById('no').onclick = () => {
    alert("You must be 18+ to continue.");
    window.location.href = "/";
  };

  // ── Send Message ────────────────────────────────────────
  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'sent');
    history.push({ role: 'user', content: text });
    localStorage.setItem('chatHistory', JSON.stringify(history));

    input.value = '';

    try {
      await fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      typing.classList.remove('hidden');

      const res = await fetch('/api/reply', { method: 'POST' });
      const data = await res.json();

      typing.classList.add('hidden');

      data.replies.forEach((bubble, i) => {
        setTimeout(() => {
          addMessage(bubble, 'received', i === data.replies.length - 1 ? data.voice_note : null);
          history.push({ role: 'assistant', content: bubble });
          localStorage.setItem('chatHistory', JSON.stringify(history));
        }, i * 1400 + 400);
      });

    } catch (err) {
      addMessage("…sorry, I got distracted for a second", 'received');
    }
  }

  input.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.onclick = send;
</script>
</body>
</html>
