<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Isabella</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        :root {
            --bg: #0d0015;
            --card: rgba(30, 10, 50, 0.88);
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --success: #00ff99;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .avatar-container {
            position: relative;
            width: 48px;
            height: 48px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .contact-info h2 {
            margin: 0;
            font-size: 19px;
            font-weight: 600;
        }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(to bottom, rgba(13,0,21,0.6), transparent);
        }

        .message {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15.5px;
            line-height: 1.45;
        }

        .sent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }

        .received {
            background: rgba(30,20,50,0.9);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .input-area {
            padding: 14px 20px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #user-input {
            flex: 1;
            padding: 14px 22px;
            border: none;
            border-radius: 32px;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(6px);
        }

        #user-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(195,0,255,0.3);
        }

        #send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.25s;
        }

        #send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 24px var(--accent-glow);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 82%;
            font-size: 14px;
            color: var(--text-muted);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        #clear-chat-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--danger), #d50000);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        #clear-chat-btn:hover {
            transform: scale(1.05);
        }

        /* Age Confirmation Modal */
        #age-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 0, 20, 0.94);
            backdrop-filter: blur(16px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #age-modal.show {
            display: flex;
            opacity: 1;
        }

        .age-modal-content {
            background: linear-gradient(145deg, rgba(20, 0, 40, 0.96), rgba(10, 0, 30, 0.98));
            border-radius: 36px;
            padding: 64px 48px;
            width: 92%;
            max-width: 540px;
            text-align: center;
            border: 1px solid rgba(195,0,255,0.15);
            box-shadow: 0 30px 120px rgba(0,0,0,0.8);
        }

        .age-title {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 28px;
            background: linear-gradient(90deg, #ff0099, #c300ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .age-text {
            font-size: 18px;
            color: #e0c0ff;
            margin-bottom: 52px;
        }

        .age-btns {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .age-btn {
            padding: 22px 64px;
            font-size: 21px;
            font-weight: 700;
            border: none;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        #age-yes {
            background: linear-gradient(135deg, #ff0099, #c300ff);
            color: white;
        }

        #age-no {
            background: linear-gradient(135deg, #ff3366, #d50000);
            color: white;
        }

        .age-legal {
            font-size: 14px;
            color: #aa88cc;
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <div class="avatar-container" onclick="openFullAvatar()">
                <div class="avatar" style="background-image: url('/static/images/isabella.png');"></div>
            </div>
            <div class="contact-info">
                <h2>Isabella</h2>
            </div>
        </div>
        <button id="clear-chat-btn" onclick="clearConversation()">Clear Chat</button>
    </div>

    <!-- Full Avatar Modal -->
    <div id="avatar-modal" class="avatar-modal">
        <span class="avatar-modal-close" onclick="closeFullAvatar()">×</span>
        <div class="avatar-modal-inner">
            <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png" alt="Isabella">
        </div>
    </div>

    <div id="messages-container">
        <!-- Messages will be added here -->
    </div>

    <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span>Isabella is typing...</span>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" autofocus />
        <button id="send-btn">➤</button>
    </div>

    <!-- Age Confirmation Modal -->
    <div id="age-modal">
        <div class="age-modal-content">
            <h2 class="age-title">One last thing...</h2>
            <p class="age-text">
                This is an exclusive 18+ experience.<br>
                Are you 18 years of age or older?
            </p>
            <div class="age-btns">
                <button id="age-yes" class="age-btn">Yes, I'm 18+</button>
                <button id="age-no" class="age-btn">No</button>
            </div>
            <p class="age-legal">
                By continuing you confirm you are of legal age in your jurisdiction.
            </p>
        </div>
    </div>

    <script>
        const API_BASE = '/';
        let convoId = localStorage.getItem('convo_id');
        let messagesHistory = JSON.parse(localStorage.getItem('messages_history') || '[]');

        // Generate unique convo ID if first time
        if (!convoId) {
            convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('convo_id', convoId);
        }

        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const ageModal = document.getElementById('age-modal');

        let debounceTimer = null;
        const DEBOUNCE_MS = 8000;
        let isProcessing = false;

        // ── Age Modal ──────────────────────────────────────────────────────────────
        function showAgeModal() {
            ageModal.style.display = 'flex';
            setTimeout(() => ageModal.classList.add('show'), 50);
            input.disabled = true;
            sendBtn.disabled = true;
        }

        function hideAgeModal() {
            ageModal.classList.remove('show');
            setTimeout(() => ageModal.style.display = 'none', 500);
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        document.getElementById('age-yes').onclick = hideAgeModal;
        document.getElementById('age-no').onclick = () => {
            alert("You must be 18+ to use this service.");
            window.location.href = "/";
        };

        // Load history on page load
        window.addEventListener('load', () => {
            if (messagesHistory.length > 0) {
                messagesContainer.innerHTML = '';
                messagesHistory.forEach(msg => {
                    const type = msg.role === 'user' ? 'sent' : 'received';
                    addMessage(msg.content, type);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            showAgeModal();
        });

        function clearConversation() {
            if (confirm("Clear this conversation?")) {
                localStorage.removeItem('convo_id');
                localStorage.removeItem('messages_history');
                messagesHistory = [];
                messagesContainer.innerHTML = '';
                convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('convo_id', convoId);
                showAgeModal();
            }
        }

        // ── Chat Functions ────────────────────────────────────────────────────────
        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            input.value = '';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, convo_id: convoId })
                });

                if (!res.ok) throw new Error('Send failed');

                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = setTimeout(triggerBotReply, DEBOUNCE_MS);
            } catch (err) {
                console.error('Send error:', err);
                addMessage("Couldn't send... try again", 'received');
            } finally {
                input.focus();
            }
        }

        async function triggerBotReply() {
            if (isProcessing) return;
            isProcessing = true;
            debounceTimer = null;

            // Show typing only when waiting
            typingIndicator.classList.remove('hidden');

            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ convo_id: convoId })
                });

                const data = await res.json();

                // Hide typing immediately after fetch
                typingIndicator.classList.add('hidden');

                for (let i = 0; i < data.replies.length; i++) {
                    const isLast = i === data.replies.length - 1;

                    if (i > 0) {
                        typingIndicator.classList.remove('hidden');
                        await new Promise(r => setTimeout(r, 1200 + Math.random() * 1400));
                        typingIndicator.classList.add('hidden');
                    }

                    addMessage(data.replies[i], 'received', isLast ? data.voice_note : null);

                    messagesHistory.push({ role: 'assistant', content: data.replies[i] });
                    localStorage.setItem('messages_history', JSON.stringify(messagesHistory));

                    if (!isLast) {
                        await new Promise(r => setTimeout(r, 900 + Math.random() * 1100));
                    }
                }
            } catch (err) {
                console.error(err);
                typingIndicator.classList.add('hidden');
                addMessage("Sorry… got distracted for a sec", 'received');
                messagesHistory.push({ role: 'assistant', content: "Sorry… got distracted for a sec" });
                localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            } finally {
                isProcessing = false;
                input.focus();
                messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
            }
        }

        function addMessage(text, type, mediaUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;

            if (mediaUrl) {
                const audio = new Audio(mediaUrl);
                const playBtn = document.createElement('button');
                playBtn.textContent = 'Play';
                playBtn.onclick = () => audio.play();
                msgDiv.appendChild(playBtn);
            }

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ── Event Listeners ───────────────────────────────────────────────────────
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function openFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('avatar-modal');
            if (event.target === modal) closeFullAvatar();
        };
    </script>
</body>
</html>
