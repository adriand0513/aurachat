<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Sparq • Isabella</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent: #c300ff;
            --accent2: #ff0099;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(195,0,255,0.3);
            flex-shrink: 0;
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: url('/static/images/isabella.png') center/cover;
            border: 2px solid var(--accent);
        }
        #chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            align-self: flex-end;
        }
        .received {
            background: rgba(30,20,50,0.95);
            align-self: flex-start;
        }
        #typing-container {
            padding: 0 16px 8px 16px;
            background: rgba(20,5,40,0.95);
            display: none;
            flex-shrink: 0;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            width: fit-content;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #bb99cc;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Offline Message */
        #offline-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30,20,50,0.95);
            padding: 24px 32px;
            border-radius: 20px;
            text-align: center;
            max-width: 85%;
            display: none;
            z-index: 100;
            border: 1px solid var(--accent);
        }

        .input-area {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        #user-input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(50,20,80,0.7);
            color: white;
            font-size: 16px;
        }
        #send-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        #user-input:disabled, #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar"></div>
        <h2>Isabella</h2>
    </div>
    <div id="chat-wrapper">
        <div id="messages"></div>
        <div id="typing-container">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <span>Isabella is typing...</span>
            </div>
        </div>
    </div>

    <!-- Offline Message -->
    <div id="offline-message">
        <h3>🌙 Isabella is Offline</h3>
        <p>Only available between<br><strong>5:00 PM - 2:00 AM ET</strong></p>
        <p style="margin-top: 12px; opacity: 0.8;">Come back during those hours ✨</p>
    </div>

    <div class="input-area">
        <input id="user-input" placeholder="Message Isabella..." autocomplete="off" />
        <button id="send-btn">➤</button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const typingContainer = document.getElementById('typing-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const offlineMessage = document.getElementById('offline-message');

        let convoId = localStorage.getItem('convo_id') || 'conv_' + Date.now();
        localStorage.setItem('convo_id', convoId);

        let messagesHistory = [];
        let isSending = false;
        let responseTimeout = null;

        const USER_TYPING_DELAY = 4500;
        const THINKING_DELAY = 3000;

        function isIsabellaAvailable() {
            const now = new Date();
            const nyFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'America/New_York',
                hour: 'numeric',
                hour12: false
            });
            const hour = parseInt(nyFormatter.format(now));
            return hour >= 17 || hour < 2; // 5 PM to 2 AM ET
        }

        function updateAvailability() {
            const available = isIsabellaAvailable();
            
            if (available) {
                offlineMessage.style.display = 'none';
                input.disabled = false;
                sendBtn.disabled = false;
            } else {
                offlineMessage.style.display = 'block';
                input.disabled = true;
                sendBtn.disabled = true;
                if (responseTimeout) clearTimeout(responseTimeout);
            }
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('messages_history');
                messagesHistory = saved ? JSON.parse(saved) : [];
            } catch (e) {
                messagesHistory = [];
            }
        }

        function saveHistory() {
            localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            typingContainer.style.display = 'block';
            scrollToBottom();
        }

        function hideTyping() {
            typingContainer.style.display = 'none';
        }

        function getTypingDuration(text) {
            const wordCount = text.trim().split(/\s+/).length;
            let baseTime = wordCount * 650;
            baseTime += Math.random() * 450;
            return Math.max(800, Math.min(Math.floor(baseTime), 14500));
        }

        async function sendToBackend(msg) {
            if (isSending || !isIsabellaAvailable()) return;
            isSending = true;
            showTyping();

            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ convo_id: convoId, message: msg })
                });

                const data = await res.json();
                if (data.replies && data.replies.length > 0) {
                    for (let bubble of data.replies) {
                        await new Promise(resolve => {
                            setTimeout(() => {
                                addMessage(bubble, 'received');
                                messagesHistory.push({ role: 'assistant', content: bubble });
                                saveHistory();
                                scrollToBottom();
                                resolve();
                            }, getTypingDuration(bubble));
                        });
                    }
                }
            } catch (err) {
                console.error("sendToBackend error:", err);
            } finally {
                hideTyping();
                isSending = false;
            }
        }

        function startResponseTimer(msg) {
            if (responseTimeout) clearTimeout(responseTimeout);

            responseTimeout = setTimeout(() => {
                setTimeout(() => {
                    sendToBackend(msg);
                    responseTimeout = null;
                }, THINKING_DELAY);
            }, USER_TYPING_DELAY);
        }

        function handleUserInput() {
            if (responseTimeout) {
                clearTimeout(responseTimeout);
                responseTimeout = null;
            }
        }

        function sendMessage() {
            if (!isIsabellaAvailable()) return;
            const msg = input.value.trim();
            if (!msg || isSending) return;

            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            saveHistory();

            input.value = '';
            startResponseTimer(msg);
        }

        // Event listeners
        input.addEventListener('input', handleUserInput);
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);

        // Initialize
        window.addEventListener('load', () => {
            loadHistory();
            messagesContainer.innerHTML = '';
            messagesHistory.forEach(m => {
                addMessage(m.content, m.role === 'user' ? 'sent' : 'received');
            });
            scrollToBottom();

            updateAvailability();
            setInterval(updateAvailability, 30000); // Check every 30 seconds
        });
    </script>
</body>
</html>
