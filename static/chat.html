<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Sparq</title>
    <style>
        :root {
            --bg: #0d0015;
            --accent: #c300ff;
            --accent2: #ff0099;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #f8f0ff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(195,0,255,0.3);
        }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: url('/static/images/isabella.png') center/cover;
            border: 2px solid var(--accent);
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; align-self: flex-end; }
        .received { background: rgba(30,20,50,0.95); align-self: flex-start; }
        .input-area {
            padding: 12px 16px;
            background: rgba(20,5,40,0.95);
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(50,20,80,0.7);
            color: white;
            font-size: 16px;
        }
        #send-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="avatar"></div>
    <h2>Isabella</h2>
</div>

<div id="messages"></div>

<div class="input-area">
    <input id="user-input" placeholder="Message Isabella..." autocomplete="off" />
    <button id="send-btn">➤</button>
</div>

<script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let convoId = localStorage.getItem('convo_id') || 'conv_' + Date.now();
    localStorage.setItem('convo_id', convoId);

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, 'sent');
        input.value = '';

        try {
            const res = await fetch('/api/reply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    convo_id: convoId,
                    message: msg
                })
            });

            const data = await res.json();
            if (data.replies) {
                data.replies.forEach(reply => addMessage(reply, 'received'));
            }
        } catch (e) {
            console.error(e);
            addMessage("Sorry, I'm having trouble responding...", 'received');
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
    });

    // Load previous messages
    const history = localStorage.getItem('messages_history');
    if (history) {
        JSON.parse(history).forEach(m => addMessage(m.content, m.role === 'user' ? 'sent' : 'received'));
    }
</script>
</body>
</html>
