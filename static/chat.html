<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aurachat</title>
    <!-- <link rel="stylesheet" href="/static/style.css" /> -->
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }
    
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
    
        html, body {
            height: 100dvh;
            min-height: -webkit-fill-available;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    
        body {
            display: flex;
            flex-direction: column;
        }
    
        .chat-header {
            flex-shrink: 0;
            padding: 14px 16px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
    
        #messages-container {
            flex: 1 1 auto;
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch !important;
            padding: 20px 16px 140px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(to bottom, rgba(13,0,21,0.6), transparent);
            scroll-behavior: smooth;
        }
    
        .message {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15.5px;
            line-height: 1.45;
        }
    
        .sent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }
    
        .received {
            background: rgba(30,20,50,0.9);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }
    
        .input-area {
            flex-shrink: 0;
            padding: 12px 16px max(20px, env(safe-area-inset-bottom));
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }
    
        #user-input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 32px;
            background: var(--input-bg);
            color: white;
            font-size: 16px !important;
        }
    
        #user-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(195,0,255,0.3);
        }
    
        #send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }
    
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 82%;
            font-size: 14px;
            color: var(--text-muted);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    
        .typing-indicator.visible {
            visibility: visible;
            opacity: 1;
        }
    
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
    
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    
        #clear-chat-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--danger), #d50000);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
    
        .voice-note {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(45, 30, 75, 0.95);
            border-radius: 9999px;
            max-width: 78%;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
    
        .voice-play-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-purple);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
    
        .avatar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
    
        .avatar-modal.show {
            display: flex;
        }
    
        .avatar-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(195,0,255,0.7);
            object-fit: contain;
        }
    
        .avatar-modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 60px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="avatar-container" onclick="openFullAvatar()">
                <div class="avatar" style="background-image: url('/static/images/isabella.png');"></div>
            </div>
            <div class="contact-info">
                <h2>Isabella</h2>
            </div>
        </div>
        <button id="clear-chat-btn" onclick="clearConversation()">Clear Chat</button>
    </div>

    <!-- Full Avatar Modal -->
    <div id="avatar-modal" class="avatar-modal">
        <span class="avatar-modal-close" onclick="closeFullAvatar()">×</span>
        <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png" alt="Isabella">
    </div>

    <!-- Main chat area -->
    <div id="messages-container"></div>
    <div id="typing-indicator" class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span>Isabella is typing...</span>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" autofocus />
        <button id="send-btn">➤</button>
    </div>

    <script>
        // === MOBILE VIEWPORT FIX ===
        function fixMobileViewport() {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
            document.body.style.height = '100dvh';
        }

        // Main variables
        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let convoId = localStorage.getItem('convo_id');
        let messagesHistory = [];
        let userIdleTimeout = null;
        let isSending = false;

        const USER_IDLE_PAUSE = 8000;

        if (!convoId) {
            convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('convo_id', convoId);
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('messages_history');
                messagesHistory = saved ? JSON.parse(saved) : [];
            } catch (e) {
                console.warn('Failed to load history, starting fresh');
                messagesHistory = [];
                localStorage.removeItem('messages_history');
            }
        }

        function saveHistory() {
            try {
                localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            } catch (e) {
                console.error('Failed to save history:', e);
            }
        }

        function initChat() {
            loadHistory();
            messagesContainer.innerHTML = '';
            messagesHistory.forEach(msg => {
                const type = msg.role === 'user' ? 'sent' : 'received';
                addMessage(msg.content, type);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        window.addEventListener('load', () => {
            initChat();
            input.focus();
            fixMobileViewport();
        });

        // Viewport fix listeners
        window.addEventListener('resize', fixMobileViewport);
        window.addEventListener('orientationchange', fixMobileViewport);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                saveHistory();
            } else if (document.visibilityState === 'visible') {
                initChat();
            }
        });

        window.addEventListener('pagehide', () => {
            saveHistory();
        });

        function clearConversation() {
            if (confirm("Clear this conversation?")) {
                localStorage.removeItem('convo_id');
                localStorage.removeItem('messages_history');
                messagesHistory = [];
                convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('convo_id', convoId);
                messagesContainer.innerHTML = '';
            }
        }

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addVoiceNote(audioUrl) {
            const voiceDiv = document.createElement('div');
            voiceDiv.className = 'voice-note message received';
            voiceDiv.innerHTML = `
                <button class="voice-play-btn">▶</button>
                <div class="voice-waveform">
                    <div class="voice-bar" style="height: 18px;"></div>
                    <div class="voice-bar" style="height: 26px;"></div>
                    <div class="voice-bar" style="height: 14px;"></div>
                    <div class="voice-bar" style="height: 30px;"></div>
                    <div class="voice-bar" style="height: 22px;"></div>
                    <div class="voice-bar" style="height: 16px;"></div>
                    <div class="voice-bar" style="height: 28px;"></div>
                    <div class="voice-bar" style="height: 20px;"></div>
                </div>
                <div class="voice-duration">0:00</div>
            `;
            const playBtn = voiceDiv.querySelector('.voice-play-btn');
            const durationEl = voiceDiv.querySelector('.voice-duration');
            const audio = new Audio(audioUrl);
            let isPlaying = false;

            audio.addEventListener('timeupdate', () => durationEl.textContent = formatTime(audio.currentTime));
            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.textContent = '▶';
            });

            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    playBtn.textContent = '▶';
                } else {
                    audio.play();
                    playBtn.textContent = '❚❚';
                }
                isPlaying = !isPlaying;
            });

            messagesContainer.appendChild(voiceDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        async function sendMessage() {
            if (isSending) return;
            const msg = input.value.trim();
            if (!msg) return;

            isSending = true;
            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            saveHistory();
            input.value = '';

            if (userIdleTimeout) clearTimeout(userIdleTimeout);
            userIdleTimeout = setTimeout(() => triggerBotReply(), USER_IDLE_PAUSE);

            input.focus();

            setTimeout(() => isSending = false, 1500);
        }

        async function triggerBotReply() {
            if (isSending) return;
            isSending = true;
            typingIndicator.classList.add('visible');

            try {
                const res = await fetch('/api/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ convo_id: convoId })
                });

                const data = await res.json();

                if (!data.replies || data.replies.length === 0) {
                    typingIndicator.classList.remove('visible');
                    isSending = false;
                    return;
                }

                for (let i = 0; i < data.replies.length; i++) {
                    const bubble = data.replies[i];
                    const isLast = i === data.replies.length - 1;
                    const delay = i === 0 ? 0 : 2800;

                    await new Promise(resolve => {
                        setTimeout(() => {
                            if (isLast && data.voice_note) {
                                addVoiceNote(data.voice_note);
                            } else {
                                addMessage(bubble, 'received');
                            }
                            messagesHistory.push({ role: 'assistant', content: bubble });
                            saveHistory();
                            resolve();
                        }, delay);
                    });
                }
            } catch (err) {
                console.error('Reply error:', err);
            } finally {
                typingIndicator.classList.remove('visible');
                isSending = false;
            }
        }

        function handleSend(e) {
            if (e) {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
            sendMessage();
        }

        sendBtn.addEventListener('click', handleSend);
        sendBtn.addEventListener('touchend', handleSend);

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend(e);
            }
        });

        function handleKeyboard() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        window.addEventListener('resize', handleKeyboard);
        window.addEventListener('orientationchange', handleKeyboard);
        input.addEventListener('focus', handleKeyboard);
        input.addEventListener('blur', handleKeyboard);

        function openFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('avatar-modal');
            if (event.target === modal) closeFullAvatar();
        };
    </script>
</body>
</html>
