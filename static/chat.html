<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Isabella</title>
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; background: #111; height: 100vh; display: flex; flex-direction: column; color: white; }
        .chat-header { padding: 12px; background: #1a1a1a; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; margin-right: 12px; }
        #messages-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; }
        .sent { background: #007aff; color: white; align-self: flex-end; }
        .received { background: #262626; color: white; align-self: flex-start; }
        .input-area { padding: 10px; background: #1a1a1a; border-top: 1px solid #222; display: flex; }
        #user-input { flex: 1; padding: 12px; border: none; border-radius: 24px; background: #2a2a2a; color: white; }
        #send-btn, .tip-btn { margin-left: 8px; padding: 10px 16px; border-radius: 24px; cursor: pointer; }
        .tip-btn { background: #ff6b6b; color: white; border: none; }
        #auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #222; padding: 32px; border-radius: 16px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #333; color: white; }
        #auth-btn { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; margin-top: 12px; cursor: pointer; }
        #auth-error { color: #ff4444; text-align: center; margin-top: 8px; }
        img.exclusive-pic { max-width: 100%; border-radius: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?ixlib=rb-4.0.3&auto=format&fit=crop&w=987&q=80');"></div>
            <div><h2>Isabella</h2><span style="color:#44ff44">online</span></div>
        </div>
        <div id="user-info">
            <span id="logged-in-header">Not logged in</span>
            <button id="logout-btn" style="display:none">Logout</button>
        </div>
    </div>

    <div id="messages-container"></div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." />
        <button id="send-btn">➤</button>
        <button id="tip-btn" class="tip-btn" style="display:none">Tip for Exclusive Pic</button>
    </div>

    <div id="auth-modal">
        <div class="modal-content">
            <h2 id="modal-title">Welcome</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <button id="tab-register" style="flex:1;padding:10px;background:#007aff;color:white;border:none;border-radius:8px">Register</button>
                <button id="tab-login" style="flex:1;padding:10px;background:#333;color:white;border:none;border-radius:8px">Login</button>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit" id="auth-btn">Register</button>
                <div id="auth-error" style="color:#ff4444;text-align:center;margin-top:8px"></div>
            </form>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('auth_token');
        let picCount = parseInt(localStorage.getItem('pic_count') || '0');

        const messagesContainer = document.getElementById('messages-container');
        const authModal = document.getElementById('auth-modal');
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const tipBtn = document.getElementById('tip-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loggedInHeader = document.getElementById('logged-in-header');

        function setLoggedIn(email) {
            loggedInHeader.textContent = `Logged in as ${email}`;
            logoutBtn.style.display = 'inline';
            tipBtn.style.display = 'inline';
            authModal.style.display = 'none';
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const isRegister = document.getElementById('auth-btn').textContent === 'Register';
            const endpoint = isRegister ? '/auth/register' : '/auth/login';

            try {
                let res;
                if (isRegister) {
                    res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                } else {
                    const params = new URLSearchParams();
                    params.append('username', email);
                    params.append('password', password);
                    res = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString()
                    });
                }

                const data = await res.json();

                if (!res.ok) {
                    authError.textContent = data.detail || 'Authentication failed';
                    return;
                }

                localStorage.setItem('auth_token', data.access_token);
                token = data.access_token;
                setLoggedIn(email);
            } catch (err) {
                authError.textContent = 'Connection error';
            }
        };

        logoutBtn.onclick = () => {
            localStorage.clear();
            location.reload();
        };

        tipBtn.onclick = async () => {
            if (!token) return alert('Login first');
            const res = await fetch('/api/create-checkout-session', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ tip_type: 'pic_tease' })
            });
            const data = await res.json();
            if (data.checkout_url) window.location.href = data.checkout_url;
        };

        // Simple message sending (for testing)
        document.getElementById('send-btn').onclick = () => {
            const input = document.getElementById('user-input');
            if (input.value.trim()) {
                const msg = document.createElement('div');
                msg.className = 'message sent';
                msg.textContent = input.value;
                messagesContainer.appendChild(msg);
                input.value = '';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        };

        // Initial setup
        if (token) {
            // Try to restore login
            fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` }})
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(user => setLoggedIn(user.email))
                .catch(() => authModal.style.display = 'flex');
        } else {
            authModal.style.display = 'flex';
        }
    </script>
</body>
</html>
