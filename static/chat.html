<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Isabella</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
            --voice-bg: rgba(40, 25, 70, 0.95);
        }
        /* ... keep all your existing styles ... */

        /* Voice Note Bubble */
        .voice-note {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--voice-bg);
            border-radius: 22px;
            max-width: 82%;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }
        .voice-play-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-purple);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .voice-play-btn:hover {
            background: var(--accent-pink);
        }
        .voice-progress {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .voice-progress-bar {
            height: 100%;
            background: var(--accent-pink);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .voice-duration {
            font-size: 13px;
            color: var(--text-muted);
            min-width: 40px;
            text-align: right;
        }
    </style>
</head>
<body>
    <!-- Your existing header and modal stay the same -->

    <div id="messages-container">
        <!-- Messages added here by JS -->
    </div>

    <div id="typing-indicator" class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span>Isabella is typing...</span>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" autofocus />
        <button id="send-btn">➤</button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        let convoId = localStorage.getItem('convo_id');
        let messagesHistory = JSON.parse(localStorage.getItem('messages_history') || '[]');
        
        let userIdleTimeout = null;
        let thinkingTimeout = null;

        const USER_IDLE_PAUSE = 5000;

        if (!convoId) {
            convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('convo_id', convoId);
        }

        window.addEventListener('load', () => {
            messagesContainer.innerHTML = '';
            messagesHistory.forEach(msg => {
                const type = msg.role === 'user' ? 'sent' : 'received';
                addMessage(msg.content, type);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.focus();
        });

        function clearConversation() {
            if (confirm("Clear this conversation?")) {
                localStorage.removeItem('convo_id');
                localStorage.removeItem('messages_history');
                messagesHistory = [];
                messagesContainer.innerHTML = '';
                convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('convo_id', convoId);
            }
        }

        function getThinkingDelay() {
            let delay = 10000 + Math.random() * 15000;
            const lastMessage = messagesHistory[messagesHistory.length - 1];
            if (lastMessage && lastMessage.role === 'user') {
                if (lastMessage.content.length > 60) delay += 4000;
                if (/baby|sexy|beautiful|want|dream|love/i.test(lastMessage.content)) delay += 3000;
            }
            return Math.floor(delay);
        }

        function getTypingDuration() {
            return 2500 + Math.random() * 2500;
        }

        function getBubbleGap() {
            return 3000 + Math.random() * 2500;
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            input.value = '';

            if (userIdleTimeout) clearTimeout(userIdleTimeout);

            userIdleTimeout = setTimeout(() => {
                triggerBotReply();
            }, USER_IDLE_PAUSE);

            try {
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, convo_id: convoId })
                });
            } catch (err) {
                console.error('Send error:', err);
            } finally {
                input.focus();
            }
        }

        async function triggerBotReply() {
            if (thinkingTimeout) clearTimeout(thinkingTimeout);

            const thinkingDelay = getThinkingDelay();

            thinkingTimeout = setTimeout(async () => {
                typingIndicator.classList.add('visible');

                try {
                    const res = await fetch('/api/reply', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ convo_id: convoId })
                    });
                    const data = await res.json();

                    for (let i = 0; i < data.replies.length; i++) {
                        const bubble = data.replies[i];
                        const isLast = i === data.replies.length - 1;
                        const delay = i === 0 ? 0 : getBubbleGap();

                        await new Promise(resolve => {
                            setTimeout(() => {
                                if (isLast && data.voice_note) {
                                    addVoiceNote(data.voice_note);
                                } else {
                                    addMessage(bubble, 'received');
                                }
                                messagesHistory.push({ role: 'assistant', content: bubble });
                                localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
                                resolve();
                            }, delay);
                        });
                    }
                } catch (err) {
                    console.error(err);
                    addMessage("Sorry… got distracted for a sec", 'received');
                } finally {
                    typingIndicator.classList.remove('visible');
                }
            }, thinkingDelay);
        }

        // New Voice Note Renderer
        function addVoiceNote(audioUrl) {
            const voiceDiv = document.createElement('div');
            voiceDiv.className = 'voice-note message received';

            voiceDiv.innerHTML = `
                <button class="voice-play-btn">▶</button>
                <div class="voice-progress">
                    <div class="voice-progress-bar"></div>
                </div>
                <div class="voice-duration">0:00</div>
            `;

            const playBtn = voiceDiv.querySelector('.voice-play-btn');
            const progressBar = voiceDiv.querySelector('.voice-progress-bar');
            const durationEl = voiceDiv.querySelector('.voice-duration');
            const audio = new Audio(audioUrl);

            let isPlaying = false;

            audio.addEventListener('timeupdate', () => {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                durationEl.textContent = formatTime(audio.currentTime);
            });

            audio.addEventListener('ended', () => {
                isPlaying = false;
                playBtn.textContent = '▶';
                progressBar.style.width = '0%';
            });

            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    playBtn.textContent = '▶';
                } else {
                    audio.play();
                    playBtn.textContent = '❚❚';
                }
                isPlaying = !isPlaying;
            });

            messagesContainer.appendChild(voiceDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function addMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Event listeners (same as before)
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function openFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('avatar-modal');
            if (event.target === modal) closeFullAvatar();
        };
    </script>
</body>
</html>
