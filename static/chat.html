<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aurachat</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        :root {
            --bg: #0d0015;
            --accent-purple: #c300ff;
            --accent-pink: #ff0099;
            --accent-glow: rgba(195, 0, 255, 0.4);
            --danger: #ff3366;
            --text: #f8f0ff;
            --text-muted: #bb99cc;
            --input-bg: rgba(50, 20, 80, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 14px 20px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
        .avatar-container {
            position: relative;
            width: 48px;
            height: 48px;
            cursor: pointer;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(to bottom, rgba(13,0,21,0.6), transparent);
            min-height: 0;
        }
        .message {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15.5px;
            line-height: 1.45;
        }
        .sent {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }
        .received {
            background: rgba(30,20,50,0.9);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }
        .input-area {
            padding: 14px 20px;
            background: linear-gradient(to right, rgba(20,5,40,0.95), rgba(40,10,60,0.95));
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(195,0,255,0.12);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            position: relative;
            z-index: 1000;
        }
        #user-input {
            flex: 1;
            padding: 14px 22px;
            border: none;
            border-radius: 32px;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
        }
        #user-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(195,0,255,0.3);
        }
        #send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        #send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(30,20,50,0.9);
            border-radius: 22px;
            align-self: flex-start;
            max-width: 82%;
            font-size: 14px;
            color: var(--text-muted);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .typing-indicator.visible {
            visibility: visible;
            opacity: 1;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        #clear-chat-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--danger), #d50000);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        #clear-chat-btn:hover {
            transform: scale(1.05);
        }
        .avatar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .avatar-modal.show {
            display: flex;
        }
        .avatar-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(195,0,255,0.7);
            object-fit: contain;
        }
        .avatar-modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 60px;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .avatar-modal-close:hover {
            color: var(--accent-pink);
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <div class="avatar-container" onclick="openFullAvatar()">
                <div class="avatar" style="background-image: url('/static/images/isabella.png');"></div>
            </div>
            <div class="contact-info">
                <h2>Isabella</h2>
            </div>
        </div>
        <button id="clear-chat-btn" onclick="clearConversation()">Clear Chat</button>
    </div>

    <!-- Full Avatar Modal -->
    <div id="avatar-modal" class="avatar-modal">
        <span class="avatar-modal-close" onclick="closeFullAvatar()">×</span>
        <img class="avatar-modal-content" id="full-avatar" src="/static/images/isabella.png" alt="Isabella">
    </div>

    <div id="messages-container">
        <!-- Messages added here by JS -->
    </div>

    <div id="typing-indicator" class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span>Isabella is typing...</span>
    </div>

    <div class="input-area">
        <input id="user-input" type="text" placeholder="Message Isabella..." autocomplete="off" autofocus />
        <button id="send-btn">➤</button>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages-container');
        const typingIndicator = document.getElementById('typing-indicator');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        let convoId = localStorage.getItem('convo_id');
        let messagesHistory = JSON.parse(localStorage.getItem('messages_history') || '[]');
        
        let userIdleTimeout = null;      // 5-second pause before Isabella starts thinking
        let thinkingTimeout = null;      // Isabella's thinking delay

        const USER_IDLE_PAUSE = 5000;    // 5 seconds - user must stop sending

        if (!convoId) {
            convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('convo_id', convoId);
        }

        // Load saved messages
        window.addEventListener('load', () => {
            messagesContainer.innerHTML = '';
            messagesHistory.forEach(msg => {
                const type = msg.role === 'user' ? 'sent' : 'received';
                addMessage(msg.content, type);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            input.focus();
        });

        function clearConversation() {
            if (confirm("Clear this conversation?")) {
                localStorage.removeItem('convo_id');
                localStorage.removeItem('messages_history');
                messagesHistory = [];
                messagesContainer.innerHTML = '';
                convoId = 'conv_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('convo_id', convoId);
            }
        }

        // Isabella's thinking delay (10-25 seconds)
        function getThinkingDelay() {
            let delay = 10000 + Math.random() * 15000;
            const lastMessage = messagesHistory[messagesHistory.length - 1];
            if (lastMessage && lastMessage.role === 'user') {
                if (lastMessage.content.length > 60) delay += 4000;
                if (/baby|sexy|beautiful|want|dream|love/i.test(lastMessage.content)) {
                    delay += 3000;
                }
            }
            return Math.floor(delay);
        }

        // Typing indicator duration (2.5 - 5 seconds)
        function getTypingDuration() {
            return 2500 + Math.random() * 2500;
        }

        // Gap between Isabella's multiple bubbles (3 - 5.5 seconds)
        function getBubbleGap() {
            return 3000 + Math.random() * 2500;   // 3 to 5.5 seconds
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'sent');
            messagesHistory.push({ role: 'user', content: msg });
            localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
            input.value = '';

            // Reset user idle timer every time a new message arrives
            if (userIdleTimeout) clearTimeout(userIdleTimeout);

            userIdleTimeout = setTimeout(() => {
                triggerBotReply();
            }, USER_IDLE_PAUSE);

            try {
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, convo_id: convoId })
                });
            } catch (err) {
                console.error('Send error:', err);
            } finally {
                input.focus();
            }
        }

        async function triggerBotReply() {
            if (thinkingTimeout) clearTimeout(thinkingTimeout);

            const thinkingDelay = getThinkingDelay();
            const typingDuration = getTypingDuration();

            thinkingTimeout = setTimeout(() => {
                typingIndicator.classList.add('visible');

                setTimeout(async () => {
                    typingIndicator.classList.remove('visible');

                    try {
                        const res = await fetch('/api/reply', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ convo_id: convoId })
                        });
                        const data = await res.json();

                        // Show bubbles with realistic gaps
                        data.replies.forEach((bubble, i) => {
                            const delay = i === 0 ? 0 : getBubbleGap();   // First bubble immediate, rest delayed
                            setTimeout(() => {
                                addMessage(bubble, 'received', i === data.replies.length - 1 ? data.voice_note : null);
                                messagesHistory.push({ role: 'assistant', content: bubble });
                                localStorage.setItem('messages_history', JSON.stringify(messagesHistory));
                            }, i * 100 + delay);   // Small base + realistic gap
                        });
                    } catch (err) {
                        console.error(err);
                        addMessage("Sorry… got distracted for a sec", 'received');
                    }
                }, typingDuration);
            }, thinkingDelay);
        }

        function addMessage(text, type, mediaUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;

            if (mediaUrl) {
                const audio = new Audio(mediaUrl);
                const playBtn = document.createElement('button');
                playBtn.textContent = 'Play';
                playBtn.onclick = () => audio.play();
                msgDiv.appendChild(playBtn);
            }

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Event listeners
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function openFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeFullAvatar() {
            const modal = document.getElementById('avatar-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('avatar-modal');
            if (event.target === modal) closeFullAvatar();
        };
    </script>
</body>
</html>
