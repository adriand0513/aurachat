<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Sparq • Live Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0012; color: #f8f0ff; }
        .chat-box { background: rgba(30,20,50,0.95); border: 1px solid #c300ff; }
        .user { background: #4f46e5; }
        .bot { background: #7e22ce; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-6 text-center">Aurora Sparq Live Monitor</h1>
        
        <div class="flex gap-4 mb-8">
            <button onclick="connectMonitor()" 
                    class="bg-purple-600 hover:bg-purple-700 px-8 py-3 rounded-2xl font-medium">
                Connect Live Monitor
            </button>
        </div>

        <div id="chats-container" class="space-y-8"></div>
    </div>

    <script>
        let ws = null;

        function connectMonitor() {
            const token = prompt("Enter ADMIN_TOKEN:");
            if (!token) return;

            ws = new WebSocket(`wss://${location.host}/ws/monitor?token=${token}`);

            ws.onopen = () => {
                console.log("✅ Monitor Connected");
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                renderChats(data);
            };

            ws.onerror = (e) => console.error("Monitor error", e);
        }

        function renderChats(data) {
            const container = document.getElementById('chats-container');
            container.innerHTML = `<p class="text-green-400">Live data received • ${new Date().toLocaleTimeString()}</p>`;
            
            // This will be expanded as we send real chat data from backend
            console.log("Monitor data:", data);
        }

        // Auto connect option (uncomment if you want)
        window.onload = connectMonitor;
    </script>
</body>
</html>
