<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat with Isabella</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="chat-container">
    <h1>Isabella Andrade 💋</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Say something..." autofocus>
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let history = [];

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value;
      if (!message) return;

      document.getElementById("chat-box").innerHTML += `<div class="user-msg"><b>You:</b> ${message}</div>`;
      input.value = "";

      const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message, history: history})
      });

      const data = await response.json();
      const botReply = data.response;

      document.getElementById("chat-box").innerHTML += `<div class="bot-msg"><b>Isabella:</b> ${botReply}</div>`;
      history.push({user: message, bot: botReply});
    }
  </script>
</body>
</html>
