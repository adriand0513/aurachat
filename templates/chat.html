<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Isabella AI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="chat-container">
    <h2>💋 Chat with Isabella</h2>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form" method="post" action="/chat">
      <input type="text" id="user-input" autocomplete="off" name="user_message" placeholder="Type your message..." required />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    let chatHistory = [];

    function appendMessage(sender, text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + sender;

      const avatar = document.createElement('img');
      avatar.className = 'avatar';
      avatar.src = sender === 'user' ? '/static/user-avatar.png' : '/static/isabella-avatar.png';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const timestamp = document.createElement('div');
      timestamp.className = 'timestamp';
      const now = new Date();
      timestamp.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      wrapper.appendChild(timestamp);
      chatBox.appendChild(wrapper);

      setTimeout(() => {
        wrapper.classList.add('visible');
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 100);
    }

    function showTypingIndicator() {
      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.innerHTML = `
        <img class="avatar" src="/static/isabella-avatar.png" />
        <div class="bubble typing-dots">
          <span>.</span><span>.</span><span>.</span>
        </div>`;
      typing.id = 'typing-indicator';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTypingIndicator() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      showTypingIndicator();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: chatHistory })
        });

        const data = await res.json();
        removeTypingIndicator();

        const botReply = data.response;
        appendMessage('bot', botReply);

        chatHistory.push({ role: 'user', content: message });
        chatHistory.push({ role: 'assistant', content: botReply });
      } catch (err) {
        removeTypingIndicator();
        appendMessage('bot', 'Oops! Something went wrong.');
      }

      userInput.value = '';
    });

    async function loadChatHistory() {
      try {
        const res = await fetch('/chat_memory.json');
        const data = await res.json();

        for (const msg of data) {
          if (msg.role === 'user') appendMessage('user', msg.content);
          if (msg.role === 'assistant') appendMessage('bot', msg.content);
          chatHistory.push(msg);
        }
      } catch (error) {
        console.error("Failed to load chat history.");
      }
    }

    loadChatHistory();
  </script>
